<svg viewBox="0 0 108 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Pine tree icon (stylized: narrow upper triangle + wider lower triangle + trunk) -->
  <!-- Upper arrow/point -->
  <polygon points="10.5,1 7.2,10 13.8,10" fill="black"/>
  <!-- Lower wider triangle (branches) -->
  <polygon points="10.5,6.5 3.5,22 17.5,22" fill="black"/>
  <!-- Trunk -->
  <rect x="8.75" y="22" width="3.5" height="5" rx="0.6" fill="black"/>
  <!-- "sylvan" wordmark -->
  <text x="25" y="23.5" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="17" font-weight="500" fill="black" letter-spacing="-0.2">sylvan</text>
</svg>
