<svg viewBox="0 0 108 30" xmlns="http://www.w3.org/2000/svg">
  <g stroke="black" stroke-linecap="round" stroke-linejoin="round" fill="none" stroke-width="1.9">
    <!-- Trunk: full vertical spine -->
    <line x1="11" y1="1.5" x2="11" y2="27.5"/>
    <!-- Upper left branch: sweeps from trunk outward and slightly down -->
    <path d="M11,8.5 Q7.5,9.5 4,12"/>
    <!-- Upper right branch -->
    <path d="M11,8.5 Q14.5,9.5 18,12"/>
    <!-- Lower left branch: wider sweep -->
    <path d="M11,15.5 Q6,17 2,19.5"/>
    <!-- Lower right branch -->
    <path d="M11,15.5 Q16,17 20,19.5"/>
  </g>
  <!-- "sylvan" wordmark — Inter/system sans-serif, regular weight -->
  <text x="26.5" y="22"
    font-family="Inter,-apple-system,BlinkMacSystemFont,'Helvetica Neue',Helvetica,Arial,sans-serif"
    font-size="16" font-weight="400" fill="black" letter-spacing="-0.2">sylvan</text>
</svg>
